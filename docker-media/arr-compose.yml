# Compose file for the *arr stack. Configuration files are stored in named
# Docker volumes and the media library remains a host bind mount.
# All containers are ran with user and group ids of the main user and
# group to aviod permissions issues of downloaded files, please refer
# the read me file for more information.

services:
  # Torrent client, used to download media.
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    restart: unless-stopped
    labels:
      - deunhealth.restart.on.unhealthy=true
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Pacific/Auckland
      - WEBUI_PORT=9191
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - qbittorrent:/config
      - /mnt/media:/media
    ports:
      - 9191:9191 # qbittorrent web interface
      - 6881:6881 # qbittorrent torrent port
    healthcheck:
      test: ping -c 1 www.google.com || exit 1
      interval: 60s
      retries: 3
      start_period: 20s
      timeout: 10s

  # Indexer for *arr applications, used to search for content.
  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    restart: unless-stopped
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Pacific/Auckland
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - prowlarr:/config
    ports:
      - 9696:9696

  # Tv series management application, used to source tv series.
  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    restart: unless-stopped
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Pacific/Auckland
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - sonarr:/config
      - /mnt/media:/media
    ports:
      - 8989:8989

  # Movie management application, used to source movies.
  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    restart: unless-stopped
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Pacific/Auckland
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - radarr:/config
      - /mnt/media:/media
    ports:
      - 7878:7878

  lidarr:
    image: lscr.io/linuxserver/lidarr:latest
    container_name: lidarr
    restart: unless-stopped
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Pacific/Auckland
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - lidarr:/config
      - /mnt/media:/media
    ports:
      - 8686:8686

  # File transcoder application, used to transcode media files.
  tdarr:
    image: ghcr.io/haveagitgat/tdarr:latest
    container_name: tdarr
    restart: unless-stopped
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Pacific/Auckland
      - internalNode=true
      - nodeID=inNode
      - nodeIP=0.0.0.0
      - nodePort=8267
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - tdarr:/config
      - /mnt/media:/media
    ports:
      - 8265:8265 # tdarr web interface
    devices:
      - /dev/dri:/dev/dri

  # Used to bypass cloudflare's anti-bot protection.
  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    restart: unless-stopped
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Pacific/Auckland
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - flaresolverr:/config
    ports:
      - 8191:8191 # flaresolverr web interface

  cleanuparr:
    image: ghcr.io/cleanuparr/cleanuparr:latest
    container_name: cleanuparr
    restart: unless-stopped
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Pacific/Auckland
    volumes:
      - /etc/localtime:/etc/localtime:ro
      - cleanuparr:/config
    ports:
      - 11011:11011
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11011/health"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3

volumes:
  qbittorrent:
  prowlarr:
  sonarr:
  radarr:
  lidarr:
  tdarr:
  flaresolverr:
  cleanuparr:
