services:
  llama-server:
    image: ghcr.io/ikawrakow/ik-llama-cpp:cpu-server
    container_name: ikllama
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - MODEL_PATH=${MODEL_PATH:-/models/your-model-filename.gguf}
    volumes:
      - /mnt/models:/models
    ulimits:
      memlock: -1
    command:
      - "--model"
      - "${MODEL_PATH:-/models/your-model-filename.gguf}"
      - "--mlock"
      - "-t"
      - "8"