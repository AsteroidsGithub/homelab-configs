services:
  llama-server:
    image: ghcr.io/ikawrakow/ik-llama-cpp:cpu-server
    container_name: ikllama
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - MODEL_PATH=${MODEL_PATH:-/models/your-model-filename.gguf}
    volumes:
      - /mnt/models:/models
    ulimits:
      memlock: -1
    command:
      - "--model"
      - "${MODEL_PATH:-/models/your-model-filename.gguf}"
      - "--t "
      - "8"
      - "--tb "
      - "8"
      - "--c "
      - "8192"
      - "--b "
      - "512"
      - "--ub "
      - "256"
      - "--ngl "
      - "0"
      - "--fa"
      - "--ctk "
      - "q8_0"
      - "--ctv "
      - "q8_0"
      - "--rtr"
      - "--mlock"
      - "--cram "
      - "4096"
      - "--jinja"
      - "--reasoning "
      - "auto"
